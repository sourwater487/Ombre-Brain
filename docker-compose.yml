services:
  ombre-brain:
    build: .
    container_name: ombre-brain
    restart: unless-stopped
    command: ["python", "server.py"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:8789:8000"
    environment:
      OMBRE_CONFIG_PATH: /app/config.lin.production.yaml
      OMBRE_TRANSPORT: streamable-http
      OMBRE_BUCKETS_DIR: /app/data/buckets
      OMBRE_STATE_DIR: /app/data/buckets/state
      OMBRE_RUNTIME_CONFIG_PATH: /app/data/buckets/state/config.runtime.yaml
    volumes:
      - ./config.lin.production.yaml:/app/config.lin.production.yaml:ro
      - ./data/buckets:/app/data/buckets
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 30s
