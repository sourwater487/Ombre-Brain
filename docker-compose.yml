services:
  ombre-brain:
    build: .
    container_name: ombre-brain
    restart: unless-stopped
    command: ["python", "server.py"]
    env_file:
      - .env

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

    ports:
      - "127.0.0.1:8789:8000"
    environment:
      OMBRE_CONFIG_PATH: /app/config.lin.production.yaml
      OMBRE_TRANSPORT: streamable-http
      OMBRE_BUCKETS_DIR: /app/data/buckets
      OMBRE_STATE_DIR: /app/data/buckets/state
      OMBRE_RUNTIME_CONFIG_PATH: /app/data/buckets/state/config.runtime.yaml
      OMBRE_ENV_PATH: /app/.env
      OMBRE_GATEWAY_ADMIN_URL: http://ombre-gateway:8010/api/config
    volumes:
      # The tracked production baseline contains no plaintext secrets. Override
      # OMBRE_CONFIG_FILE when a deployment keeps its config elsewhere.
      - type: bind
        source: "${OMBRE_CONFIG_FILE:-./config.lin.production.yaml}"
        target: /app/config.lin.production.yaml
        read_only: true
        bind:
          # Fail clearly instead of silently creating a directory when missing.
          create_host_path: false
      # Dashboard API-key changes persist back to the same host env_file.
      - ./.env:/app/.env
      - ./data/buckets:/app/data/buckets
    depends_on:
      - ombre-gateway
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 60s
      timeout: 8s
      retries: 3
      start_period: 30s

  ombre-gateway:
    build: .
    container_name: ombre-gateway
    restart: unless-stopped
    command: ["python", "gateway.py"]
    env_file:
      - .env

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

    ports:
      - "127.0.0.1:8790:8010"
    environment:
      OMBRE_CONFIG_PATH: /app/config.lin.production.yaml
      OMBRE_BUCKETS_DIR: /app/data/buckets
      OMBRE_STATE_DIR: /app/data/buckets/state
      OMBRE_RUNTIME_CONFIG_PATH: /app/data/buckets/state/config.runtime.yaml
    volumes:
      - type: bind
        source: "${OMBRE_CONFIG_FILE:-./config.lin.production.yaml}"
        target: /app/config.lin.production.yaml
        read_only: true
        bind:
          create_host_path: false
      - ./data/buckets:/app/data/buckets
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()",
        ]
      interval: 60s
      timeout: 8s
      retries: 3
      start_period: 30s
